<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blanket Web</title>
    <meta
      name="description"
      content="Blanket Web: misture sons ambientes online para foco, relaxamento e sono."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <div class="bg-orb bg-orb--a" aria-hidden="true"></div>
      <div class="bg-orb bg-orb--b" aria-hidden="true"></div>

      <header class="app__header">
        <p class="app__badge">Blanket · Web Player</p>
        <h1>Sons ambientes para foco, relaxamento e sono</h1>
        <p class="app__subtitle">
          Escolha os sons, combine os volumes e crie sua paisagem sonora ideal.
        </p>
      </header>

      <section class="master-controls" aria-label="Controles gerais">
        <div class="master-controls__actions">
          <button id="toggleAll" class="btn btn--primary" type="button">Tocar tudo</button>
          <button id="stopAll" class="btn" type="button">Parar tudo</button>
        </div>

        <label class="volume-group" for="masterVolume">
          <span>Volume geral</span>
          <input id="masterVolume" class="volume-slider" type="range" min="0" max="100" value="70" />
        </label>
      </section>

      <section>
        <ul id="soundList" class="sound-list" aria-label="Lista de sons"></ul>
      </section>
    </main>

    <template id="soundItemTemplate">
      <li class="sound-card">
        <div class="sound-card__top">
          <h2 class="sound-card__title"></h2>
          <button class="btn sound-card__toggle" type="button">Tocar</button>
        </div>
        <label class="volume-group">
          <span>Volume</span>
          <input class="sound-card__volume volume-slider" type="range" min="0" max="100" value="70" />
        </label>
      </li>
    </template>

    <script src="script.js"></script>
  </body>
</html>
