<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blanket Web</title>
    <meta
      name="description"
      content="Blanket Web: misture sons ambientes online para foco, relaxamento e sono."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb--one" aria-hidden="true"></div>
    <div class="bg-orb bg-orb--two" aria-hidden="true"></div>

    <main class="app">
      <header class="app__header glass">
        <p class="eyebrow">Ambiente Sonoro</p>
        <h1>Blanket Web</h1>
        <p class="subtitle">Crie seu mix personalizado para foco, descanso e sono profundo.</p>
      </header>

      <section class="master-controls glass" aria-label="Controles gerais">
        <div class="master-controls__buttons">
          <button id="toggleAll" class="btn btn--primary" type="button">Tocar tudo</button>
          <button id="stopAll" class="btn" type="button">Parar tudo</button>
        </div>
        <label class="volume-control" for="masterVolume">
          <span>Volume geral</span>
          <input id="masterVolume" type="range" min="0" max="100" value="70" />
        </label>
      </section>

      <section>
        <ul id="soundList" class="sound-list" aria-label="Lista de sons"></ul>
      </section>
    </main>

    <template id="soundItemTemplate">
      <li class="sound-card glass">
        <div class="sound-card__top">
          <h2 class="sound-card__title"></h2>
          <button class="btn sound-card__toggle" type="button">Tocar</button>
        </div>
        <label class="volume-control">
          <span>Volume</span>
          <input class="sound-card__volume" type="range" min="0" max="100" value="70" />
        </label>
      </li>
    </template>

    <script src="script.js"></script>
  </body>
</html>
